<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Golf Wind</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <meta name="theme-color" content="#080808">
</head>
<body>

  <!-- ── Start screen ── -->
  <div id="start-screen">
    <div id="start-inner">
      <div id="logo">
        <svg width="48" height="48" viewBox="0 0 100 140" xmlns="http://www.w3.org/2000/svg">
          <polygon points="50,4 92,62 66,62 66,136 34,136 34,62 8,62" fill="#22c55e"/>
        </svg>
        <span>Golf Wind</span>
      </div>
      <p id="tagline">Point at your target.<br>The arrow shows where the wind goes.</p>
      <button id="start-btn">Get Started</button>
    </div>
  </div>

  <!-- ── Main screen ── -->
  <div id="main-screen">

    <header>
      <span id="header-title">Golf Wind</span>
      <span id="updated">--:--</span>
    </header>

    <div id="wind-stats">
      <div id="wind-speed">--</div>
      <div id="wind-unit">km/h</div>
      <div id="wind-dir">locating...</div>
    </div>

    <div id="compass-ring">
      <svg id="arrow" viewBox="0 0 100 140" xmlns="http://www.w3.org/2000/svg">
        <polygon points="50,4 92,62 66,62 66,136 34,136 34,62 8,62" fill="#22c55e"/>
      </svg>
    </div>

    <div id="effect-cards">
      <div class="card">
        <div class="card-label">Club</div>
        <div class="card-value" id="effect-club">--</div>
      </div>
      <div class="card">
        <div class="card-label">Crosswind</div>
        <div class="card-value" id="effect-cross">--</div>
      </div>
    </div>

    <footer>
      <div id="status">Point at your target</div>
      <button id="refresh-btn">Refresh</button>
    </footer>

  </div>

  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
</body>
</html>
