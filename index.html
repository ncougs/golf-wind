<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Golf Wind</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <meta name="theme-color" content="#080808">
</head>
<body>

  <!-- ── Main screen ── -->
  <div id="main-screen" class="active">

    <header>
      <span id="header-title">Golf Wind</span>
      <span id="updated">--:--</span>
    </header>

    <div id="wind-stats">
      <div id="wind-speed">--</div>
      <div id="wind-unit">km/h</div>
      <div id="wind-dir">locating...</div>
    </div>

    <div id="wind-toggle">
      <button class="toggle-opt" data-val="wind">Wind</button>
      <button class="toggle-opt" data-val="gusts">Gusts</button>
    </div>

    <div id="compass-wrap">
      <div id="compass-ring">
        <svg id="arrow" class="loading" viewBox="0 0 100 140" xmlns="http://www.w3.org/2000/svg">
          <polygon points="50,4 92,62 66,62 66,136 34,136 34,62 8,62" fill="#22c55e"/>
        </svg>
      </div>
      <div id="compass-label">wind direction</div>
    </div>

    <div id="effect-cards">
      <div class="card" data-modal="distance">
        <div class="card-label">Distance</div>
        <div class="card-value" id="effect-dist">--</div>
        <div class="card-sub" id="effect-dist-dir"></div>
        <div class="card-tap">details ›</div>
      </div>
      <div class="card" data-modal="crosswind">
        <div class="card-label">Crosswind</div>
        <div class="card-value" id="effect-cross">--</div>
        <div class="aim-arrow-wrap">
          <svg id="aim-arrow" viewBox="0 0 40 56" xmlns="http://www.w3.org/2000/svg">
            <polygon points="20,2 34,22 26,22 26,54 14,54 14,22 6,22" fill="#fff"/>
          </svg>
        </div>
      </div>
    </div>

    <footer>
      <div id="status">Locating...</div>
      <button id="compass-btn">Enable compass</button>
      <button id="refresh-btn">Refresh</button>
    </footer>

  </div>

  <!-- ── Info modal (bottom sheet) ── -->
  <div id="modal-overlay">
    <div id="modal">
      <div id="modal-handle"></div>
      <div id="modal-header">
        <h2 id="modal-title"></h2>
        <button id="modal-close">✕</button>
      </div>
      <div id="modal-body"></div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
</body>
</html>
